<body>
    
    <h2>hi lol</h2>

    <img src="images/stonemsg.png" alt="" height="120px">

<img style="display: flex;" id="slideshow" width="400" height="300">

<script>
const images = [
    "image1.jpg",
    "image2.jpg",
    "image3.jpg",
    "image4.jpg",
    "image5.jpg",
    "image6.jpg",
    "image7.jpg",
    "image8.jpg",
    "image9.jpg",
    "image10.jpg"
];

let index = 0;

const imgElement = document.getElementById("slideshow");

function changeImage() {
    imgElement.src = images[index];
    index++;

    if (index >= images.length) {
        index = 0; // loop back to start
    }
}

changeImage(); // show first image immediately
setInterval(changeImage, 0700); // change every 2 seconds
</script>

</body>
